<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Reactor Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0;">

    <model-viewer 
        src="REAKTOR COOLED.glb" 
        alt="Model 3D Reaktor"
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        style="width: 100%; height: 100vh;">
    </model-viewer>

</body>
</html>
